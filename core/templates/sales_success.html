<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Divi Hosting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .success-box { background: white; border-radius: 20px; padding: 50px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .checkmark { font-size: 80px; margin-bottom: 20px; animation: pulse 0.6s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        h1 { color: #667eea; margin-bottom: 20px; }
        p { color: #666; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="success-box">
                <div class="checkmark">✅</div>
                <h1>Thank You!</h1>
                <p>Your inquiry has been received and a representative will contact you shortly.</p>
                <p class="text-muted">We appreciate your interest in Divi Hosting services.</p>
                <a href="{% url 'workflow_dashboard' %}" class="btn btn-primary btn-lg mt-4">View Dashboard</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
