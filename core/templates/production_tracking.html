<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Tracking - Divi Hosting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .milestone-timeline { position: relative; padding: 20px 0; }
        .milestone { padding: 15px; border-left: 4px solid #ddd; margin-bottom: 15px; background: #f8f9ff; border-radius: 5px; }
        .milestone.active { border-left-color: #667eea; background: #f0f3ff; }
        .step-badge { display: inline-block; background: white; color: #667eea; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-40 mt-5">
        <div class="step-badge mb-3">Step 4 of 7: Production Tracking</div>
        <h1 class="text-white mb-2">Project Status Updates</h1>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">🚀 Milestone Progress</h4>
                </div>
                <div class="card-body p-5">
                    <div class="milestone-timeline">
                        <div class="milestone">📦 Content Setup</div>
                        <div class="milestone">🎨 Design</div>
                        <div class="milestone">💻 Development</div>
                        <div class="milestone">➕ Add-ons</div>
                        <div class="milestone">✅ QA</div>
                        <div class="milestone">👀 Review</div>
                        <div class="milestone">🎉 Completed</div>
                    </div>

                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="id_current_milestone" class="form-label fw-bold">Current Milestone</label>
                            {{ form.current_milestone }}
                        </div>

                        <div class="mb-4">
                            <label for="id_progress_update" class="form-label fw-bold">Progress Update</label>
                            {{ form.progress_update }}
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Update Status →
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
