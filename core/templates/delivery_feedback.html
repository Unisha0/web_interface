<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Divi Hosting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .step-badge { display: inline-block; background: white; color: #667eea; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .rating-option { padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-40 mt-5">
        <div class="step-badge mb-3">Step 6 of 7: Feedback & Review</div>
        <h1 class="text-white mb-2">How was your experience?</h1>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">⭐ Project Feedback</h4>
                </div>
                <div class="card-body p-5">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">🌟 How would you rate this project?</label>
                            {% for value, label in form.rating.field.choices %}
                                <div class="rating-option">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="rating" value="{{ value }}" id="id_rating_{{ value }}">
                                        <label class="form-check-label" for="id_rating_{{ value }}">{{ label }}</label>
                                    </div>
                                </div>
                            {% endfor %}
                        </div>

                        <div class="mb-4">
                            <label for="id_feedback" class="form-label fw-bold">📝 Your Feedback</label>
                            {{ form.feedback }}
                            <small class="text-muted d-block mt-1">Please share your experience and any suggestions</small>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Submit Feedback & Continue →
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
